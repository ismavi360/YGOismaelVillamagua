<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>YGO OFFICIAL TOURNAMENT</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #0f0f0f; --card: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #f0f0f0; padding: 20px; }
        .main-title { text-align: center; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; border-bottom: 2px solid #333; padding-bottom: 15px; }
        .container { max-width: 1100px; margin: auto; background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #333; }
        .stats-bar { background: #222; padding: 20px; border-radius: 10px; margin-bottom: 25px; display: flex; justify-content: space-around; align-items: center; border-left: 5px solid var(--primary); gap: 15px; }
        .stats-bar div { display: flex; align-items: center; gap: 8px; font-size: 1.1em; }
        .stats-bar strong { color: var(--primary); font-size: 1.3em; }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #444; }
        input, select { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #2b2b2b; color: white; outline: none; }
        input { flex: 2; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: var(--primary); color: white; }
        .btn-start { background: var(--success); color: white; width: 100%; font-size: 1.2em; margin-bottom: 20px; }
        .btn-delete-node { background: var(--danger); color: white; min-width: 35px; }
        .btn-confirm-green { background: var(--success) !important; }
        .pairings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 15px; margin-top: 20px; }
        .match-card { background: #222; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .player-btn { padding: 15px; border-radius: 8px; background: #333; cursor: pointer; width: 42%; text-align: center; font-size: 15px; border: 2px solid transparent; }
        .player-btn.winner { background: var(--success) !important; border-color: #afffba; color: white; }
        .historial-box { margin-top: 20px; padding: 15px; background: #151515; border-radius: 8px; border: 1px solid #333; }
        .historial-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #222; align-items: center; }
        .nombre-historial { transition: 0.3s; }
        .nombre-inscrito { color: #2ecc71; font-weight: bold; }
        .btn-re-inscribir { background: #444; color: #fff; font-size: 0.8em; margin-right: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #151515; }
        th, td { padding: 14px; text-align: center; border-bottom: 1px solid #222; }
        th { background: #1a1a1a; color: var(--primary); text-transform: uppercase; font-size: 0.85em; }
        .confirming { background: var(--danger) !important; color: white !important; animation: blink 0.5s infinite; }
        @keyframes blink { 50% { opacity: 0.7; } }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">YGO OFFICIAL TOURNAMENT</h1>

    <div class="stats-bar">
        <div>Duelistas Inscritos: <strong id="stat-count">0</strong></div>
        <div>Rondas Suizas: <strong id="stat-rondas">0</strong></div>
        <div id="modalidad-container" style="display:none;">
            Corte: <select id="select-top-final" style="margin:0;"></select>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="nombreCompleto" placeholder="NOMBRES Y APELLIDOS" oninput="validarBotonInscripcion()">
        <button id="btn-registrar" class="btn-add" onclick="registrarDuelista()">Inscribir / Late Joiner</button>
    </div>

    <div id="view-registro">
        <button id="btn-iniciar-master" class="btn-start" style="display:none;" onclick="handleDoubleConfirm(this, 'Lanzar Torneo', iniciarTorneo)">Iniciar Ronda 1</button>
        <div id="lista-jugadores" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div>
        <div class="historial-box">
            <h4 style="margin-top:0; color:var(--primary)">Historial Global</h4>
            <div id="lista-historial-global"></div>
        </div>
    </div>

    <div id="view-torneo" style="display:none;">
        <h2 id="txt-ronda-actual" style="color:var(--warning)">Ronda 1 / ?</h2>
        <div id="pairings-list" class="pairings-grid"></div>
        <div style="display:flex; gap:10px; margin-top:30px;">
            <button style="background:#444; color:white; flex:1;" onclick="handleDoubleConfirm(this, 'Retroceder Ronda', retrocederRonda)">Retroceder Ronda</button>
            <button id="btn-siguiente" style="background:var(--warning); color:black; flex:2; font-size:1.1em;" onclick="handleDoubleConfirm(this, 'Terminar Ronda / Siguiente', terminarRonda)">Siguiente Paso</button>
        </div>
    </div>

    <div id="standings-view" style="display:none;">
        <h2 style="margin-top:40px; border-left: 4px solid var(--success); padding-left:10px;">Standings Oficiales</h2>
        <table id="main-table">
            <thead><tr><th>Pos</th><th>Duelista</th><th>Pts</th><th>OMW%</th><th>OOW%</th><th>DDD</th><th>KTS Code</th></tr></thead>
            <tbody id="tabla-body"></tbody>
        </table>
        <button style="background:var(--danger); color:white; width:100%; margin-top:40px; padding:15px;" onclick="handleDoubleConfirm(this, 'BORRAR JUGADORES Y REINICIAR', reiniciarTorneo)">TERMINAR TORNEO (TIER ERROR)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, doc, setDoc, deleteDoc, updateDoc, onSnapshot, writeBatch, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC58tN_1MeVoc32t1C3liGrQIFqpjryqW8",
        authDomain: "ygoismaelvillamagua.firebaseapp.com",
        projectId: "ygoismaelvillamagua",
        storageBucket: "ygoismaelvillamagua.firebasestorage.app",
        messagingSenderId: "624990862859",
        appId: "1:624990862859:web:170630e1e94d29fb3d910e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let jugadores = [];
    let historial = [];
    let torneo = { activa: false, ronda: 0, totalRondas: 0, pareos: [], historicoPareos: {}, finalizado: false, faseTop: false, rondaTopActual: 0 };

    window.validarBotonInscripcion = function() {
        const input = document.getElementById('nombreCompleto');
        const valor = input.value.trim().toUpperCase();
        input.value = input.value.toUpperCase(); 
        const btn = document.getElementById('btn-registrar');
        const yaExiste = jugadores.some(j => j.nombre === valor);
        btn.style.display = (yaExiste || valor === "") ? 'none' : 'block';
    };

    window.confirmAction = function(btn, callback) {
        if (btn.dataset.confirmed === "true") { callback(); } 
        else {
            btn.classList.add("btn-confirm-green"); btn.innerText = "CONFIRMAR"; btn.dataset.confirmed = "true";
            setTimeout(() => { btn.classList.remove("btn-confirm-green"); btn.innerText = "X"; btn.dataset.confirmed = "false"; }, 3000);
        }
    };

    window.handleDoubleConfirm = function(btn, originalText, callback) {
        if (btn.dataset.status === "confirming") {
            callback(); btn.dataset.status = "idle"; btn.innerText = originalText; btn.classList.remove("confirming");
        } else {
            btn.dataset.status = "confirming"; btn.innerText = "CONFIRMAR"; btn.classList.add("confirming");
            setTimeout(() => { btn.dataset.status = "idle"; btn.innerText = originalText; btn.classList.remove("confirming"); }, 2000);
        }
    };

    onSnapshot(collection(db, "jugadores"), (snap) => {
        jugadores = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        actualizarUI();
    });

    onSnapshot(collection(db, "historial_global"), (snap) => {
        historial = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderHistorial();
    });

    onSnapshot(doc(db, "torneo", "estado"), (snap) => {
        if (snap.exists()) { torneo = snap.data(); actualizarUI(); }
    });

    function actualizarUI() {
        const n = jugadores.length;
        let r = 0;
        if (n >= 4 && n <= 8) r = 3;
        else if (n >= 9 && n <= 16) r = 4;
        else if (n >= 17 && n <= 32) r = 5;
        else if (n >= 33 && n <= 64) r = 6;
        else if (n >= 65) r = 7;
        
        document.getElementById('stat-count').innerText = n;
        document.getElementById('stat-rondas').innerText = r;

        if (!torneo.activa && !torneo.finalizado) {
            document.getElementById('view-registro').style.display = 'block';
            document.getElementById('view-torneo').style.display = 'none';
            document.getElementById('standings-view').style.display = 'none';
            const modContainer = document.getElementById('modalidad-container');
            const btnIniciar = document.getElementById('btn-iniciar-master');
            if (n >= 4) {
                modContainer.style.display = 'flex';
                btnIniciar.style.display = 'block';
                const select = document.getElementById('select-top-final');
                let opts = `<option value="SUIZAS">Solo Suizas</option>`;
                if (n >= 9) opts += `<option value="TOP 4">TOP CUT 4</option>`;
                if (n >= 33) opts += `<option value="TOP 8">TOP CUT 8</option>`;
                select.innerHTML = opts;
            } else {
                modContainer.style.display = 'none';
                btnIniciar.style.display = 'none';
            }
            document.getElementById('lista-jugadores').innerHTML = jugadores.map(j => `
                <div style="background:#222; padding:10px; border-radius:6px; display:flex; justify-content:space-between; border:1px solid #333; align-items:center;">
                    <span>${j.nombre}</span>
                    <button class="btn-delete-node" data-confirmed="false" onclick="confirmAction(this, () => borrarJugador('${j.id}'))">X</button>
                </div>
            `).join('');
        } else {
            document.getElementById('view-registro').style.display = 'none';
            document.getElementById('view-torneo').style.display = 'block';
            document.getElementById('standings-view').style.display = 'block';
            document.getElementById('btn-siguiente').style.display = torneo.finalizado ? 'none' : 'block';
            renderPareos();
            renderStandings();
        }
        validarBotonInscripcion();
        renderHistorial();
    }

    function renderHistorial() {
        const div = document.getElementById('lista-historial-global');
        div.innerHTML = historial.map(h => {
            const yaInscrito = jugadores.some(j => j.nombre.toUpperCase() === h.nombre.toUpperCase());
            return `
            <div class="historial-item">
                <span class="nombre-historial ${yaInscrito ? 'nombre-inscrito' : ''}">${h.nombre}</span>
                <div>
                    ${!yaInscrito ? `<button class="btn-re-inscribir" onclick="reInscribir('${h.nombre}')">Inscribir</button>` : ''}
                    <button class="btn-delete-node" style="padding: 5px 10px;" data-confirmed="false" onclick="confirmAction(this, () => borrarDelHistorial('${h.id}'))">X</button>
                </div>
            </div>`;
        }).join('');
    }

    window.reInscribir = function(nombre) { document.getElementById('nombreCompleto').value = nombre.toUpperCase(); registrarDuelista(); };

    window.registrarDuelista = async function() {
        const full = document.getElementById('nombreCompleto').value.trim().toUpperCase();
        if(!full) return;
        if (jugadores.some(j => j.nombre.toUpperCase() === full)) {
            alert("Este duelista ya está inscrito en el torneo actual.");
            return;
        }
        const id = Date.now().toString();
        if (!historial.find(h => h.nombre.toUpperCase() === full)) {
            await setDoc(doc(db, "historial_global", id), { nombre: full });
        }
        await setDoc(doc(db, "jugadores", id), { nombre: full, puntos: 0, oponentes: [], resultados: [], rondasPerdidas: [], tieBreaker: "00000000000" });
        document.getElementById('nombreCompleto').value = "";
        validarBotonInscripcion();
    };

    window.borrarJugador = async function(id) { await deleteDoc(doc(db, "jugadores", id)); };
    window.borrarDelHistorial = async function(id) { await deleteDoc(doc(db, "historial_global", id)); };

    window.iniciarTorneo = async function() {
        const r = parseInt(document.getElementById('stat-rondas').innerText);
        const p1 = generarKTS();
        torneo = { activa: true, ronda: 1, totalRondas: r, usaTop: document.getElementById('select-top-final').value, pareos: p1, historicoPareos: { 1: p1 }, finalizado: false, faseTop: false, rondaTopActual: 0 };
        await setDoc(doc(db, "torneo", "estado"), torneo);
    };

    function generarKTS() {
        let pool = [...jugadores].sort((a, b) => b.puntos - a.puntos || Math.random() - 0.5);
        let pairs = [];
        let byeMatch = null;

        if (pool.length % 2 !== 0) {
            for (let i = pool.length - 1; i >= 0; i--) {
                if (!pool[i].oponentes.includes("BYE")) {
                    let bP = pool.splice(i, 1)[0];
                    byeMatch = { j1Id: bP.id, j2Id: "BYE", ganador: bP.id };
                    break;
                }
            }
        }

        while (pool.length > 0) {
            let j1 = pool.shift();
            let found = false;
            for (let i = 0; i < pool.length; i++) {
                if (!j1.oponentes.includes(pool[i].id)) {
                    pairs.push({ j1Id: j1.id, j2Id: pool[i].id, ganador: null });
                    pool.splice(i, 1);
                    found = true; break;
                }
            }
            if (!found && pool.length > 0) pairs.push({ j1Id: j1.id, j2Id: pool.shift().id, ganador: null });
        }
        if (byeMatch) pairs.push(byeMatch);
        return pairs;
    }

    window.marcarGanador = async function(idx, idWin) {
        torneo.pareos[idx].ganador = (torneo.pareos[idx].ganador === idWin) ? null : idWin;
        await updateDoc(doc(db, "torneo", "estado"), { pareos: torneo.pareos });
    }

    window.terminarRonda = async function() {
        const batch = writeBatch(db);
        torneo.pareos.forEach(p => {
            const j1 = jugadores.find(j => j.id === p.j1Id);
            const j2 = p.j2Id === "BYE" ? null : jugadores.find(j => j.id === p.j2Id);
            
            if (p.ganador === p.j1Id) { 
                j1.puntos += 3; j1.resultados.push('W'); 
                if(j2) { j2.resultados.push('L'); j2.rondasPerdidas.push(torneo.ronda); } 
            } else if (j2 && p.ganador === p.j2Id) { 
                j2.puntos += 3; j2.resultados.push('W'); 
                j1.resultados.push('L'); j1.rondasPerdidas.push(torneo.ronda); 
            } else if (j2) { 
                j1.resultados.push('L'); j1.rondasPerdidas.push(torneo.ronda); 
                j2.resultados.push('L'); j2.rondasPerdidas.push(torneo.ronda); 
            } else if (p.j2Id === "BYE") {
                j1.puntos += 3; j1.resultados.push('W');
            }
            j1.oponentes.push(p.j2Id);
            if(j2) { j2.oponentes.push(j1.id); batch.update(doc(db, "jugadores", j2.id), j2); }
            batch.update(doc(db, "jugadores", j1.id), j1);
        });

        if (!torneo.faseTop) {
            if (torneo.ronda < torneo.totalRondas) {
                torneo.ronda++;
                const nP = generarKTS(); torneo.pareos = nP; torneo.historicoPareos[torneo.ronda] = nP;
            } else {
                if (torneo.usaTop === "SUIZAS") { torneo.finalizado = true; } 
                else { iniciarTopCut(); }
            }
        } else {
            const ganadores = torneo.pareos.filter(p => p.ganador).map(p => p.ganador);
            if (torneo.pareos.length === 1 && ganadores.length === 1) { 
                torneo.finalizado = true; 
            } else if (ganadores.length === torneo.pareos.length) {
                const nuevosPareos = [];
                for(let i=0; i < ganadores.length; i+=2) {
                    nuevosPareos.push({ j1Id: ganadores[i], j2Id: ganadores[i+1], ganador: null });
                }
                torneo.ronda++;
                torneo.rondaTopActual++;
                torneo.pareos = nuevosPareos;
                torneo.historicoPareos[torneo.ronda] = nuevosPareos;
            } else {
                alert("Debes marcar ganadores."); return;
            }
        }
        batch.set(doc(db, "torneo", "estado"), torneo);
        await batch.commit();
    };

    function iniciarTopCut() {
        torneo.faseTop = true;
        torneo.ronda++;
        torneo.rondaTopActual = 1;
        renderStandings();
        const sorted = [...jugadores].sort((a, b) => b.tieBreaker.localeCompare(a.tieBreaker));
        const num = torneo.usaTop === "TOP 4" ? 4 : 8;
        const topPlayers = sorted.slice(0, num);
        const pairs = [];
        for(let i=0; i < num/2; i++) {
            pairs.push({ j1Id: topPlayers[i].id, j2Id: topPlayers[num - 1 - i].id, ganador: null });
        }
        torneo.pareos = pairs;
        torneo.historicoPareos[torneo.ronda] = pairs;
    }

    window.retrocederRonda = async function() {
        if (torneo.ronda === 1) return;
        const batch = writeBatch(db);
        const rAnt = torneo.ronda;
        
        jugadores.forEach(j => {
            if (j.resultados.length >= 1) {
                const ult = j.resultados.pop();
                if (ult === 'W') j.puntos -= 3;
                if (j.oponentes.length > 0) j.oponentes.pop();
                j.rondasPerdidas = j.rondasPerdidas.filter(r => r !== rAnt);
                batch.update(doc(db, "jugadores", j.id), j);
            }
        });
        
        torneo.finalizado = false;
        if (torneo.faseTop) {
            if (torneo.rondaTopActual > 1) torneo.rondaTopActual--;
            else { torneo.faseTop = false; torneo.rondaTopActual = 0; }
        }
        torneo.ronda--;
        torneo.pareos = torneo.historicoPareos[torneo.ronda];
        torneo.pareos.forEach(p => { if(p.j2Id !== "BYE") p.ganador = null; });
        batch.set(doc(db, "torneo", "estado"), torneo);
        await batch.commit();
    };

    function renderPareos() {
        let labelRonda = "";
        if (!torneo.faseTop) {
            labelRonda = `SUIZAS - Ronda ${torneo.ronda} / ${torneo.totalRondas}`;
        } else {
            const totalTops = torneo.usaTop === "TOP 4" ? 2 : 3;
            labelRonda = (torneo.pareos.length === 1) ? `PLAYOFFS - FINAL` : `PLAYOFFS - ${torneo.rondaTopActual} / ${totalTops}`;
        }
        document.getElementById('txt-ronda-actual').innerText = labelRonda;
        const lista = document.getElementById('pairings-list');
        lista.innerHTML = torneo.pareos.map((p, i) => {
            const p1 = jugadores.find(j => j.id === p.j1Id) || {nombre: '...'};
            const p2 = p.j2Id === "BYE" ? { nombre: "BYE" } : (jugadores.find(j => j.id === p.j2Id) || {nombre: '...'});
            return `<div class="match-card">
                <div class="player-btn ${p.ganador === p.j1Id ? 'winner' : ''}" onclick="${p.j2Id !== 'BYE' ? `marcarGanador(${i},'${p.j1Id}')`:''}">${p1.nombre}</div>
                <div style="color:#555">Mesa ${i+1}</div>
                ${p.j2Id === "BYE" ? `<div class="player-btn winner">BYE</div>` : `<div class="player-btn ${p.ganador === p.j2Id ? 'winner' : ''}" onclick="marcarGanador(${i},'${p.j2Id}')">${p2.nombre}</div>`}
            </div>`;
        }).join('');
    }

    function renderStandings() {
        let finalWinnerId = null;
        let finalLoserId = null;
        
        if (torneo.finalizado && torneo.faseTop && torneo.pareos.length === 1) {
            const finalMatch = torneo.pareos[0];
            finalWinnerId = finalMatch.ganador;
            finalLoserId = (finalWinnerId === finalMatch.j1Id) ? finalMatch.j2Id : finalMatch.j1Id;
        }

        jugadores.forEach(j => {
            let sumWinRates = 0;
            const opsValidos = j.oponentes.filter(o => o !== "BYE");
            opsValidos.forEach(oid => {
                const op = jugadores.find(x => x.id === oid);
                if(op) {
                    const wr = Math.max(0.33, op.puntos / (Math.max(1, op.resultados.length) * 3));
                    sumWinRates += wr;
                }
            });
            j.omw_raw = opsValidos.length ? (sumWinRates / opsValidos.length) : 0.33;
        });

        jugadores.forEach(j => {
            let sumOppOMW = 0;
            const opsValidos = j.oponentes.filter(o => o !== "BYE");
            opsValidos.forEach(oid => {
                const op = jugadores.find(x => x.id === oid);
                if(op) sumOppOMW += op.omw_raw;
            });

            const AA = j.puntos.toString().padStart(2, '0');
            const BBB = Math.floor(j.omw_raw * 1000).toString().padStart(3, '0');
            const oow_raw = opsValidos.length ? (sumOppOMW / opsValidos.length) : 0.33;
            const CCC = Math.floor(oow_raw * 1000).toString().padStart(3, '0');
            const DDD = j.rondasPerdidas.reduce((acc, r) => acc + (r * r), 0).toString().padStart(2, '0');
            
            let PRIO = "0";
            if (finalWinnerId && j.id === finalWinnerId) PRIO = "9";
            else if (finalLoserId && j.id === finalLoserId) PRIO = "8";
            
            j.tieBreaker = `${PRIO}${AA}${BBB}${CCC}${DDD}`;
            j.ddd_val = DDD;
        });

        jugadores.sort((a, b) => b.tieBreaker.localeCompare(a.tieBreaker));
        
        document.getElementById('tabla-body').innerHTML = jugadores.map((j, i) => {
            const isChamp = torneo.finalizado && ((finalWinnerId && j.id === finalWinnerId) || (!torneo.faseTop && i === 0 && j.puntos > 0));
            const isSecond = torneo.finalizado && ((finalLoserId && j.id === finalLoserId) || (!torneo.faseTop && i === 1 && j.puntos > 0));
            
            return `
            <tr style="${isChamp ? 'background: rgba(40, 167, 69, 0.15);' : isSecond ? 'background: rgba(255, 193, 7, 0.1);' : ''}">
                <td>${isChamp && torneo.finalizado ? '🏆' : i+1}</td>
                <td style="${isChamp ? 'color: var(--success); font-weight: bold;' : isSecond ? 'color: var(--warning);' : ''}">${j.nombre}</td>
                <td>${j.puntos}</td>
                <td>${(parseInt(j.tieBreaker.substring(3,6))/10).toFixed(1)}%</td>
                <td>${(parseInt(j.tieBreaker.substring(6,9))/10).toFixed(1)}%</td>
                <td>${j.ddd_val}</td>
                <td style="font-family:monospace; color:#666; font-size:10px;">${j.tieBreaker}</td>
            </tr>`;
        }).join('');
    }

    window.reiniciarTorneo = async function() {
        const batch = writeBatch(db);
        const snaps = await getDocs(collection(db, "jugadores"));
        snaps.forEach(d => batch.delete(d.ref));
        batch.set(doc(db, "torneo", "estado"), { activa: false, ronda: 0, totalRondas: 0, pareos: [], historicoPareos: {}, finalizado: false, faseTop: false, rondaTopActual: 0 });
        await batch.commit();
    };
</script>
