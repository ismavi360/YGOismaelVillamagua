<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGO DECK BUILDER V1.0</title>
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #D1D1D6;
            --ios-white: #FFFFFF;
            --ios-text: #1C1C1E;
            --ios-secondary: #8E8E93;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
        }

        html, body { overflow-x: hidden; touch-action: pan-y; -webkit-text-size-adjust: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .container { width: 100%; max-width: 480px; }

        header { text-align: center; margin: 20px 0 25px; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        header p { font-size: 13px; color: var(--ios-secondary); margin-top: 5px; }

        .card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid #E5E5EA;
        }

        .category-title { font-weight: 700; font-size: 17px; color: var(--ios-blue); }
        
        .add-btn {
            background: #F2F2F7; border: none; border-radius: 50%; width: 28px; height: 28px;
            font-size: 18px; color: var(--ios-blue); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .input-row {
            display: grid; grid-template-columns: 1fr 60px 50px; gap: 10px; margin-bottom: 10px; align-items: center;
        }

        input {
            background: #F2F2F7; border: none; border-radius: 10px; padding: 12px; font-size: 15px; outline: none; user-select: text;
        }

        .hopt-checkbox { width: 20px; height: 20px; accent-color: var(--ios-blue); }

        .btn-ios {
            border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
            width: 100%; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
        }

        .btn-analyze { background: var(--ios-blue); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-analyze.confirm { background: var(--ios-green); transform: scale(1.02); }
        .btn-delete { background: none; color: var(--ios-red); font-size: 12px; margin-top: 15px; font-weight: 500; }
        .btn-delete.confirm { background: var(--ios-red); color: white; border-radius: 12px; padding: 12px; }

        .total-section { text-align: center; margin: 20px 0; }
        .total-badge { display: block; font-size: 14px; font-weight: 600; margin-bottom: 15px; color: var(--ios-secondary); }

        .results-area { display: none; margin-top: 10px; width: 100%; }
        .result-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }

        .tier-card {
            background: linear-gradient(135deg, #1C1C1E 0%, #3A3A3C 100%);
            color: white; text-align: center; padding: 25px; border-radius: 18px; margin-bottom: 15px;
        }
        .tier-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .tier-value { font-size: 34px; font-weight: 900; letter-spacing: -1px; }
        .tier-S { color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        .tier-A { color: var(--ios-green); }
        .tier-B { color: var(--ios-blue); }
        .tier-C { color: #FF9500; }
        .tier-ERROR { color: var(--ios-red); opacity: 0.8; }

        .hand-bar-container {
            height: 44px; width: 100%; background: #E5E5EA; border-radius: 12px;
            display: flex; overflow: hidden; margin: 15px 0; border: 0.5px solid #D1D1D6;
        }
        .bar-segment {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: white; text-shadow: 0px 1px 1px rgba(0,0,0,0.2);
        }

        .cons-bar-wrapper {
            height: 32px; width: 100%; background: #E5E5EA; border-radius: 8px;
            margin-bottom: 10px; overflow: hidden; position: relative; border: 0.5px solid #D1D1D6;
            display: flex; align-items: center;
        }
        .cons-bar-fill { height: 100%; transition: width 0.6s ease-out; }
        .cons-bar-text {
            position: absolute; width: 100%; text-align: center; left: 0;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            z-index: 2; pointer-events: none;
        }

        .segment-Starters, .fill-Starters, .segment-Extenders, .fill-Extenders { background-color: var(--ios-green); }
        .segment-HandTraps, .fill-HandTraps, .segment-BoardBreakers, .fill-BoardBreakers { background-color: var(--ios-blue); }
        .segment-Bricks, .fill-Bricks { background-color: var(--ios-red); }
        .segment-Random, .fill-Random { background-color: #8E8E93; }

        .text-light { color: white; text-shadow: 0px 1px 2px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>YGO DECK BUILDER V1.0</h1>
        <p>Designed by Ismael Villamagua</p>
    </header>

    <div id="categories-main"></div>
    
    <div class="total-section">
        <span class="total-badge">Total: <span id="deck-total">0</span> / 60 cartas</span>
        <button id="mainBtn" class="btn-ios btn-analyze" onclick="handleAnalyzeClick()">ANALIZAR DECK</button>
        <button id="deleteBtn" class="btn-ios btn-delete" onclick="handleDeleteClick()">Borrar todos los datos</button>
    </div>

    <div id="results" class="results-area">
        <div id="tier-result" class="tier-card">
            <div class="tier-label">CLASIFICACIÓN</div>
            <div id="tier-text" class="tier-value">DECK TIER ERROR</div>
        </div>

        <div class="result-card">
            <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 1 (5 Draws)</div>
            <div id="bar-t1" class="hand-bar-container"></div>
            <div class="category-title" style="font-size: 14px; margin-top: 20px;">Consistencia Turno 1</div>
            <div id="cons-t1" class="consistency-list"></div>
        </div>

        <div class="result-card">
            <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 2 (6 Draws)</div>
            <div id="bar-t2" class="hand-bar-container"></div>
            <div class="category-title" style="font-size: 14px; margin-top: 20px;">Consistencia Turno 2</div>
            <div id="cons-t2" class="consistency-list"></div>
        </div>
    </div>
</div>

<script>
    const categories = ["Starters", "Extenders", "Hand Traps", "Board Breakers", "Bricks"];
    let analyzeConfirm = { active: false, timeout: null };
    let deleteConfirm = { active: false, timeout: null };

    window.onload = () => {
        const mainContainer = document.getElementById('categories-main');
        const savedData = JSON.parse(localStorage.getItem('ygo_deck_save')) || {};
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.id = catId;
            const singleCat = cat.endsWith('s') ? cat.slice(0, -1) : cat;
            cardDiv.innerHTML = `<div class="category-header"><span class="category-title">${cat}</span><button class="add-btn" onclick="addRow('${catId}', '', '', true, 'Nombre ${singleCat}')">+</button></div><div class="rows-container"></div>`;
            mainContainer.appendChild(cardDiv);
            if (savedData[cat] && savedData[cat].length > 0) {
                savedData[cat].forEach(card => addRow(catId, card.name, card.qty, card.hopt, `Nombre ${singleCat}`));
            } else { addRow(catId, '', '', true, `Nombre ${singleCat}`); }
        });
        updateTotal();
    };

    function addRow(catId, name = '', qty = '', hopt = true, placeholder = 'Nombre') {
        const target = document.querySelector(`#${catId} .rows-container`);
        const row = document.createElement('div');
        row.className = 'input-row';
        const isBrick = catId === 'cat-Bricks';
        const hoptHtml = isBrick ? '' : `<div style="display:flex; flex-direction:column; align-items:center;"><input type="checkbox" class="hopt-checkbox" ${hopt ? 'checked' : ''} onchange="saveAll()"><span style="font-size:9px; color:var(--ios-secondary)">HOPT</span></div>`;
        row.innerHTML = `<input type="text" placeholder="${placeholder}" class="i-name" value="${name}" oninput="saveAll()"><input type="number" placeholder="0" class="i-qty" min="0" max="3" value="${qty}" oninput="saveAll()">${hoptHtml}`;
        target.appendChild(row);
        updateTotal();
    }

    function saveAll() {
        const dataToSave = {};
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            dataToSave[cat] = Array.from(document.querySelectorAll(`#${catId} .input-row`)).map(row => {
                const hCheck = row.querySelector('.hopt-checkbox');
                return {
                    name: row.querySelector('.i-name').value,
                    qty: row.querySelector('.i-qty').value,
                    hopt: hCheck ? hCheck.checked : false
                };
            }).filter(card => card.name !== '' || card.qty !== '');
        });
        localStorage.setItem('ygo_deck_save', JSON.stringify(dataToSave));
        updateTotal();
    }

    function updateTotal() {
        let t = 0;
        document.querySelectorAll('.i-qty').forEach(i => t += parseInt(i.value || 0));
        const badge = document.getElementById('deck-total');
        badge.innerText = t;
        badge.style.color = (t < 40 || t > 60) ? 'var(--ios-red)' : 'var(--ios-green)';
    }

    function handleAnalyzeClick() {
        const btn = document.getElementById('mainBtn');
        const t = parseInt(document.getElementById('deck-total').innerText);
        if (t < 40 || t > 60) { alert(`DECK con ${t} cartas. Ajusta entre 40 y 60.`); return; }
        
        if (!analyzeConfirm.active) {
            analyzeConfirm.active = true;
            btn.innerText = "CONFIRMAR ANÁLISIS";
            btn.classList.add('confirm');
            analyzeConfirm.timeout = setTimeout(() => {
                analyzeConfirm.active = false;
                btn.innerText = "ANALIZAR DECK";
                btn.classList.remove('confirm');
            }, 2000);
        } else {
            clearTimeout(analyzeConfirm.timeout);
            executeAnalysis();
            analyzeConfirm.active = false;
            btn.innerText = "ANALIZAR DECK";
            btn.classList.remove('confirm');
        }
    }

    function handleDeleteClick() {
        const btn = document.getElementById('deleteBtn');
        if (!deleteConfirm.active) {
            deleteConfirm.active = true;
            btn.innerText = "CONFIRMAR BORRADO";
            btn.classList.add('confirm');
            deleteConfirm.timeout = setTimeout(() => {
                deleteConfirm.active = false;
                btn.innerText = "Borrar todos los datos";
                btn.classList.remove('confirm');
            }, 2000);
        } else {
            clearTimeout(deleteConfirm.timeout);
            localStorage.removeItem('ygo_deck_save');
            location.reload();
        }
    }

    function executeAnalysis() {
        const fullDeck = [];
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            document.querySelectorAll(`#${catId} .input-row`).forEach(row => {
                const name = row.querySelector('.i-name').value || "Card";
                const qty = parseInt(row.querySelector('.i-qty').value) || 0;
                const hCheck = row.querySelector('.hopt-checkbox');
                const h = hCheck ? hCheck.checked : false;
                for(let i=0; i<qty; i++) fullDeck.push({ name, cat, h });
            });
        });

        document.getElementById('results').style.display = 'block';
        const t1Moda = runSimulationModa(fullDeck, 5, 'bar-t1', 'cons-t1');
        runSimulationModa(fullDeck, 6, 'bar-t2', 'cons-t2');
        
        calculateTier(t1Moda);
        window.scrollTo({ top: document.getElementById('results').offsetTop - 20, behavior: 'smooth' });
    }

    function calculateTier(moda) {
        const s = moda["Starters"] || 0;
        const e = moda["Extenders"] || 0;
        const h = moda["Hand Traps"] || 0;
        const b = moda["Board Breakers"] || 0;
        const bk = moda["Bricks"] || 0;
        
        const tienePlay = (s >= 1);
        const motorTotal = s + e;
        const interaccion = h + b;
        
        const tierDiv = document.getElementById('tier-text');
        tierDiv.className = 'tier-value';
        let tier = "ERROR";

        if (tienePlay && motorTotal >= 2 && interaccion >= 2 && bk === 0) {
            tier = "S";
        } 
        else if (tienePlay && motorTotal >= 2 && interaccion >= 2 && bk === 1) {
            tier = "A";
        } 
        else if (tienePlay && motorTotal >= 2 && interaccion < 2) {
            tier = "B";
        } 
        else if (s === 1 && interaccion >= 1) {
            tier = "C";
        }

        tierDiv.innerText = (tier === "ERROR") ? "DECK TIER ERROR" : `DECK TIER ${tier}`;
        tierDiv.classList.add(`tier-${tier}`);
    }

    function runSimulationModa(deck, handSize, barId, consId) {
        const iterations = 10000;
        const stats = { Starters: [], Extenders: [], "Hand Traps": [], "Board Breakers": [], Bricks: [] };
        const successCount = { Starters: 0, Extenders: 0, "Hand Traps": 0, "Board Breakers": 0, Bricks: 0 };

        for(let i=0; i<iterations; i++) {
            const hand = [...deck].sort(() => 0.5 - Math.random()).slice(0, handSize);
            const handCount = { Starters: 0, Extenders: 0, "Hand Traps": 0, "Board Breakers": 0, Bricks: 0 };
            const seenNames = new Set();

            hand.forEach(card => {
                if (card.cat === "Bricks") {
                    handCount[card.cat]++;
                } else {
                    if (card.h) {
                        if (!seenNames.has(card.name)) {
                            handCount[card.cat]++;
                            seenNames.add(card.name);
                        }
                    } else {
                        handCount[card.cat]++;
                    }
                }
            });

            for(const cat in handCount) {
                stats[cat].push(handCount[cat]);
                if(handCount[cat] >= 1) successCount[cat]++;
            }
        }

        const modaResult = {};
        categories.forEach(cat => {
            const counts = {};
            stats[cat].forEach(val => counts[val] = (counts[val] || 0) + 1);
            let maxFreq = 0;
            let modaVal = 0;
            for(const val in counts) {
                if(counts[val] > maxFreq) {
                    maxFreq = counts[val];
                    modaVal = parseInt(val);
                }
            }
            modaResult[cat] = modaVal;
        });

        const bar = document.getElementById(barId);
        bar.innerHTML = '';
        let totalModaCards = 0;
        categories.forEach(cat => {
            const val = modaResult[cat];
            if(val > 0) {
                totalModaCards += val;
                const segment = document.createElement('div');
                segment.className = `bar-segment segment-${cat.replace(/\s/g, '')}`;
                segment.style.width = `${(val / handSize) * 100}%`;
                segment.innerHTML = `<span>${cat.toUpperCase()} ${val}</span>`;
                bar.appendChild(segment);
            }
        });
        
        if(totalModaCards < handSize) {
            const rest = handSize - totalModaCards;
            const segment = document.createElement('div');
            segment.className = `bar-segment segment-Random`;
            segment.style.width = `${(rest / handSize) * 100}%`;
            segment.innerHTML = `<span>RANDOM ${rest}</span>`;
            bar.appendChild(segment);
        }

        const consList = document.getElementById(consId);
        consList.innerHTML = '';
        categories.forEach(cat => {
            const p = ((successCount[cat] / iterations) * 100).toFixed(1);
            const catClass = cat.replace(/\s/g, '');
            consList.innerHTML += `
                <div class="cons-bar-wrapper">
                    <div class="cons-bar-text text-light">${cat} ≥ 1: ${p}%</div>
                    <div class="cons-bar-fill fill-${catClass}" style="width:${p}%"></div>
                </div>`;
        });

        return modaResult;
    }
</script>
</body>
</html>
