<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGO DECK BUILDER V1.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #D1D1D6;
            --ios-white: #FFFFFF;
            --ios-text: #1C1C1E;
            --ios-secondary: #8E8E93;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --aqua-strong: #00CED1; 
            --purple-strong: #9370DB; 
        }

        html, body { overflow-x: hidden; touch-action: pan-y; -webkit-text-size-adjust: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .container { width: 100%; max-width: 480px; }

        header { text-align: center; margin: 20px 0 25px; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        header p { font-size: 13px; color: var(--ios-secondary); margin-top: 5px; }

        .deck-header-info {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            box-sizing: border-box;
        }

        .deck-header-info input { width: 100%; box-sizing: border-box; }

        .card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid #E5E5EA;
        }

        .category-title { font-weight: 700; font-size: 17px; color: var(--ios-blue); }
        
        .category-footer {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 0.5px dashed #E5E5EA;
            font-size: 12px;
            font-weight: 600;
            color: var(--ios-secondary);
            text-align: right;
        }

        .add-btn {
            background: #F2F2F7; border: none; border-radius: 50%; width: 28px; height: 28px;
            font-size: 18px; color: var(--ios-blue); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .input-row {
            display: grid; grid-template-columns: 1fr 60px 50px; gap: 10px; margin-bottom: 10px; align-items: center;
        }

        input {
            background: #F2F2F7; border: none; border-radius: 10px; padding: 12px; font-size: 15px; outline: none; user-select: text;
        }

        .hopt-checkbox { width: 20px; height: 20px; accent-color: var(--ios-blue); }

        .btn-ios {
            border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
            width: 100%; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-blue { background: var(--ios-blue); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-blue.confirm-analyze, .btn-blue.confirm-import { background: var(--ios-green); transform: scale(1.02); }
        .btn-blue.confirm-clear { background: var(--ios-red); transform: scale(1.02); }
        
        .btn-pdf { background: var(--ios-blue); color: white; margin-top: 10px; display: none; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-pdf.confirm-pdf { background: var(--ios-green); transform: scale(1.02); }

        .total-section { text-align: center; margin: 20px 0; display: flex; flex-direction: column; align-items: center; }
        .total-badge { display: block; font-size: 14px; font-weight: 600; margin-bottom: 15px; color: var(--ios-secondary); }

        .results-area { display: none; margin-top: 10px; width: 100%; box-sizing: border-box; }
        #capture-container { 
            background-color: #F2F2F7; 
            padding: 10px; 
            width: 100%; 
            max-width: 480px; 
            border-radius: 20px; 
            box-sizing: border-box;
            margin: 0 auto;
        }

        .result-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow); }

        .tier-card {
            background: linear-gradient(135deg, #1C1C1E 0%, #3A3A3C 100%);
            color: white; text-align: center; padding: 25px; border-radius: 18px; margin-bottom: 15px;
        }
        .tier-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .tier-value { font-size: 34px; font-weight: 900; letter-spacing: -1px; }
        .tier-S { color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        .tier-A { color: var(--ios-green); }
        .tier-B { color: var(--ios-blue); }
        .tier-C { color: #FF9500; }
        .tier-ERROR { color: var(--ios-red); opacity: 0.8; }

        .hand-bar-container {
            height: 60px; 
            width: 100%; background: #E5E5EA; border-radius: 12px;
            display: flex; overflow: hidden; margin: 15px 0; border: 0.5px solid #D1D1D6;
        }
        .bar-segment {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: white; text-shadow: 0px 1px 1px rgba(0,0,0,0.2);
        }

        .cons-bar-wrapper {
            height: 32px; width: 100%; background: #E5E5EA; border-radius: 8px;
            margin-bottom: 10px; overflow: hidden; position: relative;
            display: flex; align-items: center;
        }
        .cons-bar-fill { height: 100%; transition: width 0.6s ease-out; }
        .cons-bar-text {
            position: absolute; width: 100%; text-align: center; left: 0;
            font-size: 12px; font-weight: 800; text-transform: uppercase;
            z-index: 2; pointer-events: none;
        }

        .segment-Starters, .fill-Starters { background-color: var(--ios-green); }
        .segment-Extenders, .fill-Extenders { background-color: var(--aqua-strong); color: white; } 
        .segment-HandTraps, .fill-HandTraps { background-color: var(--ios-blue); }
        .segment-BoardBreakers, .fill-BoardBreakers { background-color: var(--purple-strong); color: white; } 
        .segment-Bricks, .fill-Bricks { background-color: var(--ios-red); }
        .segment-Random, .fill-Random { background-color: #8E8E93; }

        .text-light { color: white; text-shadow: 0px 1px 2px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>YGO DECK BUILDER V1.0</h1>
        <p>Designed by Ismael Villamagua</p>
    </header>

    <div class="deck-header-info">
        <input type="text" id="deck-name" placeholder="Nombre del Deck" oninput="saveAll()">
        <input type="text" id="deck-format" placeholder="Formato" oninput="saveAll()">
    </div>

    <div id="categories-main"></div>
    
    <div class="total-section">
        <span class="total-badge">Total: <span id="deck-total">0</span> / 60 cartas</span>
        <button id="mainBtn" class="btn-ios btn-blue" onclick="handleAnalyzeClick()">ANALIZAR DECK</button>
        <button id="importBtn" class="btn-ios btn-blue" onclick="handleImportClick()">IMPORTAR DECK</button>
        <input type="file" id="fileInput" style="display:none" accept=".json" onchange="processFile(event)">
        <button id="deleteBtn" class="btn-ios btn-blue" onclick="handleDeleteClick()">CLEAR DECK</button>
    </div>

    <div id="results" class="results-area">
        <div id="capture-container">
            <div id="tier-result" class="tier-card">
                <div class="tier-label">CLASIFICACIÓN</div>
                <div id="tier-text" class="tier-value">DECK TIER ERROR</div>
            </div>

            <div class="result-card">
                <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 1 (5 Draws)</div>
                <div id="bar-t1" class="hand-bar-container"></div>
                <div id="cons-t1" class="consistency-list"></div>
            </div>

            <div class="result-card">
                <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 2 (6 Draws)</div>
                <div id="bar-t2" class="hand-bar-container"></div>
                <div id="cons-t2" class="consistency-list"></div>
            </div>
        </div>

        <button id="pdfBtn" class="btn-ios btn-pdf" onclick="handleDownloadClick()">DESCARGAR RESULTADOS</button>
    </div>
</div>

<script>
    const categories = ["Starters", "Extenders", "Hand Traps", "Board Breakers", "Bricks"];
    let analyzeConfirm = { active: false, timeout: null };
    let deleteConfirm = { active: false, timeout: null };
    let pdfConfirm = { active: false, timeout: null };
    let importConfirm = { active: false, timeout: null };

    window.onload = () => {
        const mainContainer = document.getElementById('categories-main');
        const savedData = JSON.parse(localStorage.getItem('ygo_deck_save')) || {};
        
        document.getElementById('deck-name').value = savedData.deckName || "";
        document.getElementById('deck-format').value = savedData.deckFormat || "";

        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.id = catId;
            const singleCat = cat.endsWith('s') ? cat.slice(0, -1) : cat;
            cardDiv.innerHTML = `
                <div class="category-header">
                    <span class="category-title">${cat}</span>
                    <button class="add-btn" onclick="addRow('${catId}', '', '', true, 'Nombre ${singleCat}')">+</button>
                </div>
                <div class="rows-container"></div>
                <div class="category-footer">Total ${cat}: <span id="total-val-${catId}">0</span></div>
            `;
            mainContainer.appendChild(cardDiv);
            if (savedData[cat] && savedData[cat].length > 0) {
                savedData[cat].forEach(card => addRow(catId, card.name, card.qty, card.hopt, `Nombre ${singleCat}`));
            } else { addRow(catId, '', '', true, `Nombre ${singleCat}`); }
        });
        updateTotal();
    };

    function addRow(catId, name = '', qty = '', hopt = true, placeholder = 'Nombre') {
        const target = document.querySelector(`#${catId} .rows-container`);
        const row = document.createElement('div');
        row.className = 'input-row';
        const isBrick = catId === 'cat-Bricks';
        const hoptHtml = isBrick ? '' : `<div style="display:flex; flex-direction:column; align-items:center;"><input type="checkbox" class="hopt-checkbox" ${hopt ? 'checked' : ''} onchange="saveAll()"><span style="font-size:9px; color:var(--ios-secondary)">HOPT</span></div>`;
        row.innerHTML = `<input type="text" placeholder="${placeholder}" class="i-name" value="${name}" oninput="saveAll()"><input type="number" placeholder="0" class="i-qty" min="0" max="3" value="${qty}" oninput="saveAll()">${hoptHtml}`;
        target.appendChild(row);
        updateTotal();
    }

    function saveAll() {
        const dataToSave = {
            deckName: document.getElementById('deck-name').value,
            deckFormat: document.getElementById('deck-format').value
        };
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            let catSum = 0;
            dataToSave[cat] = Array.from(document.querySelectorAll(`#${catId} .input-row`)).map(row => {
                const hCheck = row.querySelector('.hopt-checkbox');
                const qtyVal = parseInt(row.querySelector('.i-qty').value || 0);
                catSum += qtyVal;
                return {
                    name: row.querySelector('.i-name').value,
                    qty: qtyVal,
                    hopt: hCheck ? hCheck.checked : false
                };
            }).filter(card => card.name !== '' || card.qty !== 0);
            
            const footerVal = document.getElementById(`total-val-${catId}`);
            if(footerVal) footerVal.innerText = catSum;
        });
        localStorage.setItem('ygo_deck_save', JSON.stringify(dataToSave));
        updateTotal();
    }

    function updateTotal() {
        let t = 0;
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            let catSum = 0;
            document.querySelectorAll(`#${catId} .i-qty`).forEach(i => catSum += parseInt(i.value || 0));
            t += catSum;
            const footerVal = document.getElementById(`total-val-${catId}`);
            if(footerVal) footerVal.innerText = catSum;
        });
        const badge = document.getElementById('deck-total');
        badge.innerText = t;
        badge.style.color = (t < 40 || t > 60) ? 'var(--ios-red)' : 'var(--ios-green)';
    }

    function handleAnalyzeClick() {
        const btn = document.getElementById('mainBtn');
        const t = parseInt(document.getElementById('deck-total').innerText);
        if (t < 40 || t > 60) { alert(`DECK con ${t} cartas. Ajusta entre 40 y 60.`); return; }
        
        if (!analyzeConfirm.active) {
            analyzeConfirm.active = true;
            btn.innerText = "CONFIRMAR ANÁLISIS";
            btn.classList.add('confirm-analyze');
            analyzeConfirm.timeout = setTimeout(() => {
                analyzeConfirm.active = false;
                btn.innerText = "ANALIZAR DECK";
                btn.classList.remove('confirm-analyze');
            }, 2000);
        } else {
            clearTimeout(analyzeConfirm.timeout);
            executeAnalysis();
            analyzeConfirm.active = false;
            btn.innerText = "ANALIZAR DECK";
            btn.classList.remove('confirm-analyze');
            document.getElementById('pdfBtn').style.display = 'block';
        }
    }

    function handleImportClick() {
        const btn = document.getElementById('importBtn');
        if (!importConfirm.active) {
            importConfirm.active = true;
            btn.innerText = "¿SELECCIONAR .JSON?";
            btn.classList.add('confirm-import');
            importConfirm.timeout = setTimeout(() => {
                importConfirm.active = false;
                btn.innerText = "IMPORTAR DECK";
                btn.classList.remove('confirm-import');
            }, 2000);
        } else {
            clearTimeout(importConfirm.timeout);
            document.getElementById('fileInput').click();
            importConfirm.active = false;
            btn.innerText = "IMPORTAR DECK";
            btn.classList.remove('confirm-import');
        }
    }

    function processFile(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                localStorage.setItem('ygo_deck_save', JSON.stringify(data));
                location.reload();
            } catch (err) { alert("Archivo inválido."); }
        };
        reader.readAsText(file);
    }

    function handleDownloadClick() {
        const btn = document.getElementById('pdfBtn');
        if (!pdfConfirm.active) {
            pdfConfirm.active = true;
            btn.innerText = "CONFIRMAR DESCARGA";
            btn.classList.add('confirm-pdf');
            pdfConfirm.timeout = setTimeout(() => {
                pdfConfirm.active = false;
                btn.innerText = "DESCARGAR RESULTADOS";
                btn.classList.remove('confirm-pdf');
            }, 2000);
        } else {
            clearTimeout(pdfConfirm.timeout);
            generatePDF();
            pdfConfirm.active = false;
            btn.innerText = "DESCARGAR RESULTADOS";
            btn.classList.remove('confirm-pdf');
        }
    }

    function handleDeleteClick() {
        const btn = document.getElementById('deleteBtn');
        if (!deleteConfirm.active) {
            deleteConfirm.active = true;
            btn.innerText = "¿Está seguro?";
            btn.classList.add('confirm-clear');
            deleteConfirm.timeout = setTimeout(() => {
                deleteConfirm.active = false;
                btn.innerText = "CLEAR DECK";
                btn.classList.remove('confirm-clear');
            }, 3000);
        } else {
            clearTimeout(deleteConfirm.timeout);
            localStorage.removeItem('ygo_deck_save');
            location.reload();
        }
    }

    function fisherYates(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function executeAnalysis() {
        const fullDeck = [];
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            document.querySelectorAll(`#${catId} .input-row`).forEach(row => {
                const name = row.querySelector('.i-name').value || "Card";
                const qty = parseInt(row.querySelector('.i-qty').value) || 0;
                const hCheck = row.querySelector('.hopt-checkbox');
                const h = hCheck ? hCheck.checked : false;
                for(let i=0; i<qty; i++) fullDeck.push({ name, cat, h });
            });
        });

        document.getElementById('results').style.display = 'block';
        const t1Moda = runSimulationModa(fullDeck, 5, 'bar-t1', 'cons-t1');
        runSimulationModa(fullDeck, 6, 'bar-t2', 'cons-t2');
        
        calculateTier(t1Moda);
        window.scrollTo({ top: document.getElementById('results').offsetTop - 20, behavior: 'smooth' });
    }

    function calculateTier(moda) {
        const s = moda["Starters"] || 0;
        const e = moda["Extenders"] || 0;
        const h = moda["Hand Traps"] || 0;
        const b = moda["Board Breakers"] || 0;
        const bk = moda["Bricks"] || 0;

        const motorTotal = s + e;
        const interaccion = h + b;
        
        const tierDiv = document.getElementById('tier-text');
        tierDiv.className = 'tier-value';
        let tier = "ERROR";

        // Lógica de Clasificación de Tiers
        if (s === 0) {
            tier = "ERROR";
        } else if (s >= 1 && motorTotal >= 2 && interaccion >= 2 && bk === 0) {
            tier = "S";
        } else if (s >= 1 && motorTotal >= 2 && interaccion >= 2 && bk >= 1) {
            tier = "A";
        } else if (s >= 1 && motorTotal >= 2 && interaccion > 0 && interaccion < 2) {
            tier = "B";
        } else if (s <= 1 && e === 1) {
            tier = "C";
        } else {
            tier = "ERROR";
        }

        tierDiv.innerText = (tier === "ERROR") ? "DECK TIER ERROR" : `DECK TIER ${tier}`;
        tierDiv.classList.add(`tier-${tier}`);
    }

    function runSimulationModa(deck, handSize, barId, consId) {
        const iterations = 10000;
        const stats = { Starters: [], Extenders: [], "Hand Traps": [], "Board Breakers": [], Bricks: [] };
        const successCount = { Starters: 0, Extenders: 0, "Hand Traps": 0, "Board Breakers": 0, Bricks: 0 };
        for(let i=0; i<iterations; i++) {
            const shuffled = fisherYates([...deck]);
            const hand = shuffled.slice(0, handSize);
            const handCount = { Starters: 0, Extenders: 0, "Hand Traps": 0, "Board Breakers": 0, Bricks: 0 };
            const seenInHand = { Starters: new Set(), Extenders: new Set(), "Hand Traps": new Set(), "Board Breakers": new Set() };
            hand.forEach(card => {
                if (card.cat === "Bricks") { handCount[card.cat]++; } 
                else if (card.h) { 
                    if (!seenInHand[card.cat].has(card.name)) {
                        handCount[card.cat]++;
                        seenInHand[card.cat].add(card.name);
                    }
                } else { handCount[card.cat]++; }
            });
            for(const cat in handCount) { stats[cat].push(handCount[cat]); if(handCount[cat] >= 1) successCount[cat]++; }
        }
        const modaResult = {};
        categories.forEach(cat => {
            const counts = {};
            stats[cat].forEach(val => counts[val] = (counts[val] || 0) + 1);
            let maxFreq = 0, modaVal = 0;
            for(const val in counts) { if(counts[val] > maxFreq) { maxFreq = counts[val]; modaVal = parseInt(val); } }
            const probSuccess = successCount[cat] / iterations;
            if (modaVal === 0 && probSuccess >= 0.45) { modaVal = 1; }
            modaResult[cat] = modaVal;
        });
        const bar = document.getElementById(barId);
        bar.innerHTML = '';
        let totalModaCards = 0;
        categories.forEach(cat => {
            const val = modaResult[cat];
            if(val > 0) {
                let currentVal = Math.min(val, handSize - totalModaCards);
                if (currentVal > 0) {
                    const segment = document.createElement('div');
                    segment.className = `bar-segment segment-${cat.replace(/\s/g, '')}`;
                    segment.style.width = `${(currentVal / handSize) * 100}%`;
                    segment.innerHTML = `<span>${cat.toUpperCase()} ${currentVal}</span>`;
                    bar.appendChild(segment);
                    totalModaCards += currentVal;
                }
            }
        });
        if(totalModaCards < handSize) {
            const rest = handSize - totalModaCards;
            const segment = document.createElement('div');
            segment.className = `bar-segment segment-Random`;
            segment.style.width = `${(rest / handSize) * 100}%`;
            segment.innerHTML = `<span>RANDOM ${rest}</span>`;
            bar.appendChild(segment);
        }
        const consList = document.getElementById(consId);
        consList.innerHTML = '';
        categories.forEach(cat => {
            const p = ((successCount[cat] / iterations) * 100).toFixed(1);
            const catClass = cat.replace(/\s/g, '');
            consList.innerHTML += `<div class="cons-bar-wrapper"><div class="cons-bar-text text-light">${cat}: ${p}%</div><div class="cons-bar-fill fill-${catClass}" style="width:${p}%"></div></div>`;
        });
        return modaResult;
    }

    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const pageWidth = 210;
        const pageHeight = 297;
        const deckName = document.getElementById('deck-name').value || "Mazo sin nombre";
        const deckFormat = document.getElementById('deck-format').value || "N/A";
        const tier = document.getElementById('tier-text').innerText;
        const deckTotalCount = document.getElementById('deck-total').innerText;

        const rawData = JSON.parse(localStorage.getItem('ygo_deck_save'));
        const blob = new Blob([JSON.stringify(rawData)], {type: "application/json"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `${deckName.replace(/\s+/g, '_')}_backup.json`;
        link.click();

        doc.setFont(undefined, 'bold'); doc.setFontSize(10); doc.setTextColor(0, 122, 255);
        doc.text(deckName.toUpperCase(), 20, 20);
        
        doc.setFont(undefined, 'normal'); doc.setFontSize(10); doc.setTextColor(28, 28, 30);
        doc.text(`Formato: ${deckFormat}`, 20, 30);
        doc.text(`Clasificación: ${tier}`, 20, 40);
        doc.setDrawColor(209, 209, 214); doc.line(20, 45, 190, 45);

        let y = 55;
        const savedData = JSON.parse(localStorage.getItem('ygo_deck_save')) || {};
        const lineSpacing = 4.5; 
        
        categories.forEach(cat => {
            const cards = savedData[cat] || [];
            if (cards.length > 0) {
                let catTotal = 0;
                doc.setFont(undefined, 'bold'); doc.setFontSize(10); doc.setTextColor(0, 122, 255);
                doc.text(cat.toUpperCase(), 20, y); y += lineSpacing;
                
                doc.setFont(undefined, 'normal'); doc.setFontSize(10); doc.setTextColor(28, 28, 30);
                cards.forEach(card => {
                    if(card.name && card.qty > 0) {
                        const q = parseInt(card.qty);
                        doc.text(`- ${card.name} x${q} ${card.hopt ? '[HOPT]' : ''}`, 25, y);
                        catTotal += q;
                        y += lineSpacing;
                    }
                });
                doc.setFont(undefined, 'italic'); doc.setFontSize(9); doc.setTextColor(142, 142, 147);
                doc.text(`Subtotal ${cat}: ${catTotal} cartas`, 25, y);
                y += lineSpacing + 2;
                if(y > 250) { doc.addPage(); y = 20; }
            }
        });

        y += 5;
        if(y > 270) { doc.addPage(); y = 20; }
        doc.setDrawColor(0, 122, 255); doc.setLineWidth(0.8);
        doc.line(20, y, 190, y); y += 10;
        doc.setFontSize(10); doc.setFont(undefined, 'bold'); doc.setTextColor(0, 122, 255);
        doc.text(`TAMAÑO TOTAL DEL DECK: ${deckTotalCount} CARTAS`, 20, y);

        doc.addPage();
        const canvas = await html2canvas(document.getElementById('capture-container'), {
            scale: 3, useCORS: true, logging: false, backgroundColor: '#F2F2F7'
        });
        const imgData = canvas.toDataURL('image/png', 1.0);
        const imgWidthPdf = 160; 
        const imgHeightPdf = (canvas.height * imgWidthPdf) / canvas.width;
        let finalW = imgWidthPdf; let finalH = imgHeightPdf;
        if (finalH > 240) { finalH = 240; finalW = (canvas.width * finalH) / canvas.height; }
        const posX = (pageWidth - finalW) / 2; const posY = (pageHeight - finalH) / 2;
        doc.setFontSize(18); doc.setTextColor(0, 122, 255);
        doc.text("ANÁLISIS DE RESULTADOS", 20, 20);
        doc.addImage(imgData, 'PNG', posX, posY, finalW, finalH, undefined, 'FAST');
        doc.save(`${deckName.replace(/\s+/g, '_')}_Reporte.pdf`);
    }
</script>
