<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="iconTournament.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGO AI DECK BUILDER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --ios-bg: #F2F2F7;
            --ios-card: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-green: #34C759;
            --ios-red: #FF3B30;
            --ios-gray: #D1D1D6;
            --ios-white: #FFFFFF;
            --ios-text: #1C1C1E;
            --ios-secondary: #8E8E93;
            --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --aqua-strong: #00CED1; 
            --purple-strong: #9370DB; 
        }

        .cloud-item-name {
            cursor: pointer;
            flex-grow: 1;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.1s ease-in-out, opacity 0.2s;
            display: inline-block;
        }
        .cloud-item-name:active { transform: scale(0.95); opacity: 0.7; }

        html, body { overflow-x: hidden; touch-action: pan-y; -webkit-text-size-adjust: none; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }

        .container { width: 100%; max-width: 480px; }

        header { text-align: center; margin: 20px 0 25px; }
        header h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
        header p { font-size: 13px; color: var(--ios-secondary); margin-top: 5px; }

        .deck-header-info {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr 44px;
            gap: 8px;
            box-sizing: border-box;
            align-items: center;
        }

        .deck-header-info input { width: 100%; box-sizing: border-box; padding: 10px; font-size: 14px; }

        .btn-gear {
            background: #E5E5EA;
            border: none;
            border-radius: 10px;
            width: 40px;
            height: 40px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            color: var(--ios-secondary);
        }
        
        .btn-gear.confirm-config { background: var(--ios-green); color: white; }

        .card {
            background: var(--ios-card);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            box-shadow: var(--shadow);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 0.5px solid #E5E5EA;
        }

        .category-title { font-weight: 700; font-size: 17px; color: var(--ios-blue); }
        
        .category-footer {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 0.5px dashed #E5E5EA;
            font-size: 12px;
            font-weight: 600;
            color: var(--ios-secondary);
            text-align: right;
        }

        .add-btn {
            background: #F2F2F7; border: none; border-radius: 50%; width: 28px; height: 28px;
            font-size: 18px; color: var(--ios-blue); cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .input-row {
            display: grid; grid-template-columns: 1fr 60px 50px; gap: 10px; margin-bottom: 10px; align-items: center;
        }

        input, select {
            background: #F2F2F7; border: none; border-radius: 10px; padding: 12px; font-size: 15px; outline: none; user-select: text;
        }

        .hopt-checkbox { width: 20px; height: 20px; accent-color: var(--ios-blue); }

        .btn-ios {
            border: none; border-radius: 14px; padding: 16px; font-size: 16px; font-weight: 700;
            width: 100%; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            margin-bottom: 10px;
        }

        .btn-blue { background: var(--ios-blue); color: white; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-purple { background: var(--purple-strong); color: white; box-shadow: 0 4px 12px rgba(147, 112, 219, 0.2); }
        
        .btn-ios.confirm-analyze, .btn-ios.confirm-sync { background: var(--ios-green); transform: scale(1.02); color: white;}
        .btn-ios.confirm-clear { background: var(--ios-red) !important; transform: scale(1.02); color: white; }
        
        .btn-pdf { background: var(--ios-blue); color: white; margin-top: 10px; display: none; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.2); }
        .btn-pdf.confirm-pdf { background: var(--ios-green); transform: scale(1.02); }

        .total-section { 
            text-align: center; 
            margin: 20px 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 100%;
        }

        .total-badge { 
            display: block; 
            font-size: 14px; 
            font-weight: 600; 
            margin-bottom: 30px; 
            color: var(--ios-secondary);
            text-align: center;
            width: 100%;
        }

        .results-area { display: none; margin-top: 10px; width: 100%; box-sizing: border-box; }
        #capture-container { 
            background-color: #F2F2F7; 
            padding: 15px; 
            width: 100%; 
            max-width: 480px; 
            border-radius: 20px; 
            box-sizing: border-box;
            margin: 0 auto;
        }

        .result-card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 15px; box-shadow: var(--shadow); }

        .tier-card {
            background: linear-gradient(135deg, #1C1C1E 0%, #3A3A3C 100%);
            color: white; text-align: center; padding: 25px; border-radius: 18px; margin-bottom: 15px;
        }
        .tier-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; margin-bottom: 5px; }
        .tier-value { font-size: 30px; font-weight: 900; letter-spacing: -1px; }
        .tier-S { color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.6); }
        .tier-A { color: var(--ios-green); }
        .tier-B { color: var(--ios-blue); }
        .tier-C { color: #FF9500; }
        .tier-ERROR { color: var(--ios-red); opacity: 0.8; }

        .hand-bar-container {
            height: 60px; width: 100%; background: #E5E5EA; border-radius: 12px;
            display: flex; overflow: hidden; margin: 15px 0; border: 0.5px solid #D1D1D6;
        }
        .bar-segment {
            height: 100%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: 800; color: white; text-shadow: 0px 1px 1px rgba(0,0,0,0.2);
            overflow: hidden; text-align: center; white-space: nowrap; padding: 0 4px;
        }

        .segment-Starters, .fill-Starters { background-color: var(--ios-green); }
        .segment-Extenders, .fill-Extenders { background-color: var(--aqua-strong); } 
        .segment-Interrupcion, .fill-Interrupcion { background-color: var(--purple-strong); } 
        .segment-Bricks, .fill-Bricks { background-color: var(--ios-red); }
        .segment-Random, .fill-Random { background-color: #8E8E93; }

        .cloud-list {
            background: var(--ios-card); border-radius: 16px; padding: 10px; margin-top: 15px;
            box-shadow: var(--shadow); display: none; width: 100%; box-sizing: border-box;
        }
        .cloud-item {
            display: flex; justify-content: space-between; align-items: center; padding: 12px;
            border-bottom: 0.5px solid var(--ios-gray);
        }
        
        #tier-config-panel { display: none; margin-bottom: 20px; width: 100%; }
        .rule-card { background: white; border-radius: 16px; padding: 15px; margin-bottom: 10px; box-shadow: var(--shadow); }
        .rule-row { display: grid; grid-template-columns: 45px 55px 1fr 60px 45px; gap: 5px; align-items: center; margin-bottom: 8px; font-size: 10px; }
        .rule-row span { font-weight: 800; color: var(--ios-blue); text-align: center; line-height: 1.1; }
        .rule-row input, .rule-row select { padding: 5px; font-size: 12px; border-radius: 6px; text-align: center; }
        
        .powerup-area { margin-top: 20px; padding: 15px; border-radius: 16px; background: white; box-shadow: var(--shadow); display: none; text-align: left; font-size: 14px; line-height: 1.4; color: var(--ios-text); } 
        
        /* Contenedor de cada barra de probabilidad */
.cons-bar-wrapper {
    position: relative;
    height: 30px; /* Un poco más gruesas para que quepa el texto */
    background: #E5E5EA;
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 0.5px solid #D1D1D6;
}

/* El relleno de color de la barra */
.cons-bar-fill {
    height: 100%;
    transition: width 0.5s ease-out;
}

/* El texto dentro de la barra */
.cons-bar-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    padding-left: 10px;
    font-size: 11px;
    font-weight: 800;
    color: #1C1C1E; /* Texto oscuro por defecto */
    pointer-events: none;
    box-sizing: border-box;
}

/* Clase para que el texto sea blanco si la barra está muy llena */
.cons-bar-text.text-light {
    color: white;
    text-shadow: 0px 1px 2px rgba(0,0,0,0.3);
}
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>YGO AI DECK BUILDER</h1>
        <p>Designed by Ismael Villamagua</p>
    </header>

    <div class="deck-header-info">
        <input type="text" id="deck-name" placeholder="Nombre del Deck" oninput="saveAll()">
        <input type="text" id="deck-format" placeholder="Formato" oninput="saveAll()">
        <button id="configBtn" class="btn-gear" onclick="handleConfigClick()">⚙️</button>
    </div>

    <div id="tier-config-panel">
        <div id="rules-container"></div>
        <div style="display:flex; gap: 10px;">
            <button class="btn-ios btn-blue" onclick="addTierDefinition()" style="flex:1; font-size:13px; padding:10px; background:var(--ios-gray); color:var(--ios-text)">+ TIER</button>
            <button id="defaultBtn" class="btn-ios btn-green" onclick="handleDefaultClick()" style="flex:1; font-size:13px; padding:10px; background:var(--ios-green); color:white">TIER DEFAULT</button>
        </div>
    </div>

    <div id="categories-main"></div>
    
    <div class="total-section">
        <span class="total-badge">Total: <span id="deck-total">0</span> / 60 cartas</span>
        <button id="syncBtn" class="btn-ios btn-purple" onclick="handleSyncClick()">GUARDAR DECK</button>
        <button id="viewCloudBtn" class="btn-ios btn-purple" onclick="toggleCloudList()">ABRIR DECK</button>
        <div id="cloud-explorer" class="cloud-list">
            <div id="cloud-items-container"></div>
        </div>
        <button id="mainBtn" class="btn-ios btn-blue" onclick="handleAnalyzeClick()">ANALIZAR DECK</button>
        <button id="deleteBtn" class="btn-ios btn-blue" onclick="handleDeleteClick()">CLEAR DECK</button>
    </div>

    <div id="results" class="results-area">
        <div id="capture-container">
            <div id="tier-result" class="tier-card">
                <div class="tier-label">CLASIFICACIÓN</div>
                <div id="tier-text" class="tier-value">TIER ERROR</div>
            </div>
            <div class="result-card">
                <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 1 (5 Draws)</div>
                <div id="bar-t1" class="hand-bar-container"></div>
                <div id="cons-t1" class="consistency-list"></div>
            </div>
            <div class="result-card">
                <div class="category-title" style="color:var(--ios-text)">Mano Probable: Turno 2 (6 Draws)</div>
                <div id="bar-t2" class="hand-bar-container"></div>
                <div id="cons-t2" class="consistency-list"></div>
            </div>
        </div>
        <button id="pdfBtn" class="btn-ios btn-pdf" onclick="handleDownloadClick()">DESCARGAR RESULTADOS</button>
        <div id="powerup-results" class="powerup-area"></div>
        <div id="prob-table-container" style="margin-top: 20px; overflow-x: auto; background: white; border-radius: 16px; padding: 15px; box-shadow: var(--shadow); display: none;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px;">
    <h3 style="font-size: 16px; color: var(--ios-text); margin: 0;">Matriz de Probabilidad</h3>
    <div style="font-size: 12px;">
       <input type="number" id="prob-threshold" value="60" oninput="actualizarTodo()" style="width: 50px; padding: 2px; text-align: center;">%
    </div>
</div>
            <table id="prob-table" style="width:100%; border-collapse: collapse; font-size: 12px; text-align: center;">
                <thead>
                    <tr style="background: var(--ios-blue); color: white;">
                        <th style="padding: 10px; border-radius: 10px 0 0 10px;">Deck</th>
                        <th style="padding: 10px;">Starters</th>
                        <th style="padding: 10px;">Motor (S+E)</th>
                        <th style="padding: 10px; border-radius: 0 10px 10px 0;">Interrupción</th>
                    </tr>
                </thead>
                <tbody id="prob-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC58tN_1MeVoc32t1C3liGrQIFqpjryqW8",
        authDomain: "ygoismaelvillamagua.firebaseapp.com",
        projectId: "ygoismaelvillamagua",
        storageBucket: "ygoismaelvillamagua.firebasestorage.app",
        messagingSenderId: "624990862859",
        appId: "1:624990862859:web:170630e1e94d29fb3d910e",
        measurementId: "G-TXKEZS7MRT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let syncConfirm = { active: false, timeout: null };
    let delCloudConfirm = { id: null, timeout: null };

    window.handleSyncClick = async () => {
        const btn = document.getElementById('syncBtn');
        const deckNameInput = document.getElementById('deck-name').value.trim().toUpperCase();
        if (!deckNameInput) { alert("Por favor, ingresa un NOMBRE DEL DECK."); return; }
        if (!syncConfirm.active) {
            syncConfirm.active = true;
            btn.innerText = "CONFIRMAR GUARDADO";
            btn.classList.add('confirm-sync');
            syncConfirm.timeout = setTimeout(() => {
                syncConfirm.active = false; btn.innerText = "GUARDAR DECK"; btn.classList.remove('confirm-sync');
            }, 2500);
        } else {
            clearTimeout(syncConfirm.timeout);
            btn.innerText = "CONECTANDO...";
            try {
                const docRef = doc(db, "decks", deckNameInput);
                const currentData = JSON.parse(localStorage.getItem('ygo_deck_save'));
                if (currentData) { await setDoc(docRef, currentData); alert(`¡Deck "${deckNameInput}" guardado!`); }
            } catch (error) { alert("Error de conexión con Firebase."); }
            syncConfirm.active = false; btn.innerText = "GUARDAR DECK"; btn.classList.remove('confirm-sync');
        }
    };

    window.toggleCloudList = async () => {
        const container = document.getElementById('cloud-explorer');
        const list = document.getElementById('cloud-items-container');
        if (container.style.display === 'block') { container.style.display = 'none'; return; }
        list.innerHTML = "<p style='padding:10px; font-size:12px;'>Cargando biblioteca...</p>";
        container.style.display = 'block';
        try {
            const querySnapshot = await getDocs(collection(db, "decks"));
            list.innerHTML = "";
            if(querySnapshot.empty) { list.innerHTML = "<p style='padding:10px; font-size:12px;'>La biblioteca está vacía.</p>"; return; }
            querySnapshot.forEach((docSnap) => {
                const name = docSnap.id;
                const row = document.createElement('div');
                row.className = 'cloud-item';
                row.innerHTML = `<span class="cloud-item-name" onclick="loadFromCloud('${name}')">${name}</span><button class="btn-delete-cloud" id="del-${name}" style="background:var(--ios-blue); color:white; border:none; border-radius:8px; padding:8px 12px; font-size:11px; font-weight:bold;" onclick="handleCloudDelete('${name}')">BORRAR</button>`;
                list.appendChild(row);
            });
        } catch (e) { alert("Error al acceder a la nube."); }
    };

    window.loadFromCloud = async (name) => {
        try {
            const docRef = doc(db, "decks", name);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) { localStorage.setItem('ygo_deck_save', JSON.stringify(docSnap.data())); location.reload(); }
        } catch (e) { alert("Error al cargar."); }
    };

    window.handleCloudDelete = async (name) => {
        const btn = document.getElementById(`del-${name}`);
        if (delCloudConfirm.id !== name) {
            delCloudConfirm.id = name;
            btn.innerText = "CONFIRMAR"; btn.style.background = "var(--ios-red)";
            delCloudConfirm.timeout = setTimeout(() => { delCloudConfirm.id = null; btn.innerText = "BORRAR"; btn.style.background = "var(--ios-blue)"; }, 2000);
        } else {
            clearTimeout(delCloudConfirm.timeout);
            try { await deleteDoc(doc(db, "decks", name)); window.toggleCloudList(); } catch (e) { alert("Error al eliminar."); }
            delCloudConfirm.id = null;
        }
    };
</script>

<script>
    const categories = ["Starters", "Extenders", "Interrupcion", "Bricks"];
    let analyzeConfirm = { active: false, timeout: null };
    let deleteConfirm = { active: false, timeout: null };
    let configConfirm = { active: false, timeout: null };
    let delTierConfirm = { idx: null, timeout: null };
    let defaultConfirm = { active: false, timeout: null };
    
    let customTierRules = [];

    window.onload = () => {
        const mainContainer = document.getElementById('categories-main');
        const savedData = JSON.parse(localStorage.getItem('ygo_deck_save')) || {};
        document.getElementById('deck-name').value = savedData.deckName || "";
        document.getElementById('deck-format').value = savedData.deckFormat || "";
        
        // Recuperar el umbral si existe
    if (savedData.probThreshold) {
        document.getElementById('prob-threshold').value = savedData.probThreshold;
    }

        customTierRules = savedData.tierRules || [
            { name: "S", rules: { "Starters": [1, "<=", "<=", 2], "Motor (S+E)": [1, "<=", "<=", 3], "Interrupcion": [2, "<=", "<=", 5], "Bricks": [0, "==", "==", 0] } },
            { name: "A", rules: { "Starters": [1, "<=", "<=", 2], "Motor (S+E)": [1, "<=", "<=", 3], "Interrupcion": [1, "<=", "<=", 5], "Bricks": [0, "<=", "<=", 5] } }
        ];

        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.id = catId;
            const singleCat = (cat === 'Interrupcion') ? 'Interrupción' : (cat.endsWith('s') ? cat.slice(0, -1) : cat);
            cardDiv.innerHTML = `<div class="category-header"><span class="category-title">${cat === 'Interrupcion' ? 'Interrupción (HT/BB)' : cat}</span><button class="add-btn" onclick="addRow('${catId}', '', '', true, 'Nombre ${singleCat}')">+</button></div><div class="rows-container"></div><div class="category-footer">Total ${cat}: <span id="total-val-${catId}">0</span></div>`;
            mainContainer.appendChild(cardDiv);
            if (savedData[cat] && savedData[cat].length > 0) { savedData[cat].forEach(card => addRow(catId, card.name, card.qty, card.hopt, `Nombre ${singleCat}`)); }
            else { addRow(catId, '', '', true, `Nombre ${singleCat}`); }
        });

        renderTierRules();
        saveAll();
        updateTotal();
    };

    function handleDefaultClick() {
        const btn = document.getElementById('defaultBtn');
        if (!defaultConfirm.active) {
            defaultConfirm.active = true;
            btn.innerText = "CONFIRMAR DEFAULT";
            btn.style.background = "var(--ios-blue)";
            defaultConfirm.timeout = setTimeout(() => {
                defaultConfirm.active = false;
                btn.innerText = "TIER DEFAULT";
                btn.style.background = "var(--ios-green)";
            }, 2500);
        } else {
            clearTimeout(defaultConfirm.timeout);
            setDefaults();
            defaultConfirm.active = false;
            btn.innerText = "TIER DEFAULT";
            btn.style.background = "var(--ios-green)";
        }
    }

    function setDefaults() {
        customTierRules = [
            { name: "S", rules: { "Starters": [1, "<=", "<=", 6], "Motor (S+E)": [2, "<=", "<=", 6], "Interrupcion": [2, "<=", "<=", 6], "Bricks": [0, "==", "==", 0] } },
            { name: "A", rules: { "Starters": [1, "<=", "<=", 6], "Motor (S+E)": [2, "<=", "<=", 6], "Interrupcion": [2, "==", "==", 2], "Bricks": [1, "<=", "<=", 6] } },
            { name: "B", rules: { "Starters": [1, "<=", "<=", 6], "Motor (S+E)": [2, "<=", "<=", 6], "Interrupcion": [1, "==", "==", 1], "Bricks": [0, "<=", "<=", 6] } },
            { name: "C", rules: { "Starters": [1, "==", "==", 1], "Motor (S+E)": [1, "==", "==", 1], "Interrupcion": [0, "<=", "<=", 6], "Bricks": [0, "<=", "<=", 6] } }
        ];
        renderTierRules();
        saveAll();
    }

    function handleConfigClick() {
        const btn = document.getElementById('configBtn');
        const panel = document.getElementById('tier-config-panel');
        if (!configConfirm.active) {
            configConfirm.active = true;
            btn.classList.add('confirm-config');
            configConfirm.timeout = setTimeout(() => { configConfirm.active = false; btn.classList.remove('confirm-config'); }, 2500);
        } else {
            clearTimeout(configConfirm.timeout);
            panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            configConfirm.active = false; btn.classList.remove('confirm-config');
            saveAll();
        }
    }

    function addTierDefinition() {
        customTierRules.push({ name: "NEW", rules: { "Starters": [0, "<=", "<=", 5], "Motor (S+E)": [0, "<=", "<=", 10], "Interrupcion": [0, "<=", "<=", 10], "Bricks": [0, "<=", "<=", 5] } });
        renderTierRules();
    }

    function renderTierRules() {
        const container = document.getElementById('rules-container');
        container.innerHTML = "";
        const visibleRuleKeys = ["Starters", "Motor (S+E)", "Interrupcion", "Bricks"];
        customTierRules.forEach((tr, idx) => {
            const div = document.createElement('div');
            div.className = "rule-card";
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <div style="display:flex; align-items:center; gap:5px;">
                    <span style="font-weight:900; font-size:14px; color:var(--ios-text)">TIER:</span>
                    <input type="text" value="${tr.name}" oninput="updateTierRuleName(${idx}, this.value)" style="width:60px; font-weight:900; background:var(--ios-gray); padding:5px;">
                </div>
                <button class="btn-delete-tier" id="del-tier-${idx}" style="background:var(--ios-blue); color:white; border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-weight:bold;" onclick="handleTierDelete(${idx})">BORRAR</button>
            </div>`;
            visibleRuleKeys.forEach(key => {
                const r = tr.rules[key] || [0, "<=", "<=", 5];
                html += `<div class="rule-row">
                    <input type="number" value="${r[0]}" oninput="updateTierValue(${idx},'${key}',0,this.value)">
                    <select onchange="updateTierValue(${idx},'${key}',1,this.value)"><option value="<" ${r[1]=='<'?'selected':''}> < </option><option value="<=" ${r[1]=='<='?'selected':''}> <= </option><option value="==" ${r[1]=='=='?'selected':''}> == </option></select>
                    <span>${key.toUpperCase()}</span>
                    <select onchange="updateTierValue(${idx},'${key}',2,this.value)"><option value="<" ${r[2]=='<'?'selected':''}> < </option><option value="<=" ${r[2]=='<='?'selected':''}> <= </option><option value="==" ${r[2]=='=='?'selected':''}> == </option></select>
                    <input type="number" value="${r[3]}" oninput="updateTierValue(${idx},'${key}',3,this.value)">
                </div>`;
            });
            div.innerHTML = html;
            container.appendChild(div);
        });
    }

    function updateTierRuleName(idx, val) { customTierRules[idx].name = val.toUpperCase(); saveAll(); }
    function updateTierValue(idx, key, pos, val) {
        if(!customTierRules[idx].rules[key]) customTierRules[idx].rules[key] = [0, "<=", "<=", 5];
        customTierRules[idx].rules[key][pos] = isNaN(parseInt(val)) ? val : parseInt(val);
        saveAll();
    }

    function handleTierDelete(idx) {
        const btn = document.getElementById(`del-tier-${idx}`);
        if (delTierConfirm.idx !== idx) {
            delTierConfirm.idx = idx; btn.innerText = "CONFIRMAR"; btn.style.background = "var(--ios-red)";
            delTierConfirm.timeout = setTimeout(() => { delTierConfirm.idx = null; btn.innerText = "BORRAR"; btn.style.background = "var(--ios-blue)"; }, 2000);
        } else {
            clearTimeout(delTierConfirm.timeout); customTierRules.splice(idx, 1); renderTierRules(); saveAll(); delTierConfirm.idx = null;
        }
    }

    function addRow(catId, name = '', qty = '', hopt = true, placeholder = 'Nombre') {
        const target = document.querySelector(`#${catId} .rows-container`);
        const row = document.createElement('div');
        row.className = 'input-row';
        const isBrick = catId === 'cat-Bricks';
        const hoptHtml = isBrick ? '' : `<div style="display:flex; flex-direction:column; align-items:center;"><input type="checkbox" class="hopt-checkbox" ${hopt ? 'checked' : ''} onchange="saveAll()"><span style="font-size:9px; color:var(--ios-secondary)">HOPT</span></div>`;
        row.innerHTML = `<input type="text" placeholder="${placeholder}" class="i-name" value="${name}" oninput="saveAll()"><input type="number" placeholder="0" class="i-qty" min="0" max="3" value="${qty}" oninput="saveAll()">${hoptHtml}`;
        target.appendChild(row);
        updateTotal();
    }

    function saveAll() {
       const dataToSave = { 
        deckName: document.getElementById('deck-name').value, 
        deckFormat: document.getElementById('deck-format').value, 
        tierRules: customTierRules,
        probThreshold: document.getElementById('prob-threshold').value || 60 // Guardamos el umbral
    };
        categories.forEach(cat => {
            const catId = `cat-${cat.replace(/\s/g, '')}`;
            dataToSave[cat] = Array.from(document.querySelectorAll(`#${catId} .input-row`)).map(row => ({
                name: row.querySelector('.i-name').value,
                qty: parseInt(row.querySelector('.i-qty').value) || 0,
                hopt: row.querySelector('.hopt-checkbox')?.checked ?? false
            })).filter(c => c.qty > 0);
            const sum = dataToSave[cat].reduce((a, b) => a + b.qty, 0);
            document.getElementById(`total-val-${catId}`).innerText = sum;
        });
        localStorage.setItem('ygo_deck_save', JSON.stringify(dataToSave));
        updateTotal();
    }

    function updateTotal() {
        let total = 0;
        document.querySelectorAll('.i-qty').forEach(input => total += parseInt(input.value) || 0);
        document.getElementById('deck-total').innerText = total;
    }

    function handleAnalyzeClick() {
        const btn = document.getElementById('mainBtn');
        if (!analyzeConfirm.active) {
            analyzeConfirm.active = true; btn.innerText = "CONFIRMAR ANÁLISIS"; btn.classList.add('confirm-analyze');
            analyzeConfirm.timeout = setTimeout(() => { analyzeConfirm.active = false; btn.innerText = "ANALIZAR DECK"; btn.classList.remove('confirm-analyze'); }, 2500);
        } else {
            clearTimeout(analyzeConfirm.timeout); executeAnalysis(); calculateProbabilityTable();
            analyzeConfirm.active = false; btn.innerText = "ANALIZAR DECK"; btn.classList.remove('confirm-analyze');
        }
    }

    function calculateHypergeometricProb(N, K, n, k) {
        if (k > n || k > K) return 0;
        function combinations(n, k) {
            if (k < 0 || k > n) return 0;
            if (k === 0 || k === n) return 1;
            if (k > n / 2) k = n - k;
            let res = 1;
            for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
            return res;
        }
        let prob = 0;
        for (let i = k; i <= Math.min(n, K); i++) prob += (combinations(K, i) * combinations(N - K, n - i)) / combinations(N, n);
        return prob;
    }

    function getHandValues(N, n, S, E, Inter, B, R) {
    const counts = { "Starters": S, "Extenders": E, "Interrupcion": Inter, "Bricks": B, "Random": R };
    let hand = {};
    let remaining = n;
    
    // Calculamos la proporción redondeada para cada categoría
    Object.keys(counts).forEach(key => {
        let val = Math.round((counts[key] / N) * n);
        if (val > remaining) val = remaining;
        hand[key] = val; 
        remaining -= val;
    });
    
    // Si sobran espacios por redondeo, se asignan a Random
    if (remaining > 0) hand["Random"] = (hand["Random"] || 0) + remaining;
    
    return hand;
}

    function executeAnalysis() {
    const data = JSON.parse(localStorage.getItem('ygo_deck_save'));
    if (!data) return;

    const totalCards = parseInt(document.getElementById('deck-total').innerText);
    if (totalCards < 40) {
        alert("El mazo debe tener al menos 40 cartas.");
        return;
    }

    document.getElementById('results').style.display = 'block';

    const totalS = data.Starters.reduce((a, b) => a + b.qty, 0);
    const totalE = data.Extenders.reduce((a, b) => a + b.qty, 0);
    const totalInter = data.Interrupcion.reduce((a, b) => a + b.qty, 0);
    const totalB = data.Bricks.reduce((a, b) => a + b.qty, 0);
    const totalR = totalCards - (totalS + totalE + totalInter + totalB);

    // Proceso para Turno 1 (5 cartas)
    const modaT1 = runMonteCarloModa(data, 5, totalCards);
    renderBar('bar-t1', 'cons-t1', totalCards, 5, totalS, totalE, totalInter, totalB, totalR, modaT1);

    // Proceso para Turno 2 (6 cartas)
    const modaT2 = runMonteCarloModa(data, 6, totalCards);
    renderBar('bar-t2', 'cons-t2', totalCards, 6, totalS, totalE, totalInter, totalB, totalR, modaT2);

    evaluateTier(modaT1);
    document.getElementById('pdfBtn').style.display = 'block';
    executePowerUp();
}

function renderBar(barId, listId, N, n, S, E, Inter, B, R, simulatedHand) {
    const bar = document.getElementById(barId);
    const list = document.getElementById(listId);
    if (!bar || !list) return;

    bar.innerHTML = ""; 
    list.innerHTML = "";

    // Dibujar los segmentos de la MODA obtenida por Monte Carlo
    const categoriesOrder = ["Starters", "Extenders", "Interrupcion", "Bricks", "Random"];
    categoriesOrder.forEach(key => {
        const val = simulatedHand[key] || 0;
        if (val > 0) {
            const seg = document.createElement('div');
            seg.className = `bar-segment segment-${key}`;
            seg.style.flex = val;
            seg.innerText = val;
            bar.appendChild(seg);
        }
    });

    // Barras de Probabilidad Acumulada (Cálculo puro >= 1)
    const countsReal = { "Starters": S, "Extenders": E, "Interrupcion": Inter, "Bricks": B };
    const probCategories = ["Starters", "Extenders", "Interrupcion", "Bricks"];
    
    probCategories.forEach(key => {
        const p = calculateHypergeometricProb(N, countsReal[key], n, 1) * 100;
        const displayName = key === "Interrupcion" ? "INTERRUPCIÓN" : key.toUpperCase();
        
        list.innerHTML += `
            <div class="cons-bar-wrapper">
                <div class="cons-bar-fill fill-${key}" style="width:${p}%"></div>
                <div class="cons-bar-text ${p > 50 ? 'text-light' : ''}">
                    ${displayName} ≥ 1: ${p.toFixed(1)}%
                </div>
            </div>`;
    });
}
function evaluateTier(hand) {
    const text = document.getElementById('tier-text');
    const card = document.getElementById('tier-result');
    
    // Extraemos valores calculados de la mano
    const S = hand["Starters"] || 0;
    const E = hand["Extenders"] || 0;
    const Inter = hand["Interrupcion"] || 0;
    const B = hand["Bricks"] || 0;
    const motor = S + E; // Criterio Starters + Extenders

    function checkRule(valorActual, regla) {
        if (!regla) return true;
        const [min, opMin, opMax, max] = regla;
        const cumpleMin = (opMin === '==' ? valorActual === min : (opMin === '<=' ? valorActual >= min : valorActual > min));
        const cumpleMax = (opMax === '==' ? valorActual === max : (opMax === '<=' ? valorActual <= max : valorActual < max));
        return cumpleMin && cumpleMax;
    }

    let finalTier = "ERROR";
    
    // Analizamos en el orden del array (S -> A -> B -> C)
    for (let tr of customTierRules) {
        // Paso 1: Starters
        if (!checkRule(S, tr.rules["Starters"])) continue;
        
        // Paso 2: Starters + Extenders (Motor)
        if (!checkRule(motor, tr.rules["Motor (S+E)"])) continue;
        
        // Paso 3: Interrupciones
        if (!checkRule(Inter, tr.rules["Interrupcion"])) continue;
        
        // Paso 4: Bricks
        if (!checkRule(B, tr.rules["Bricks"])) continue;

        // Si llegó aquí, cumple todos los intervalos de este Tier
        finalTier = tr.name;
        break; 
    }

    text.innerText = `TIER ${finalTier}`;
    card.className = 'tier-card'; 
    card.classList.add(`tier-${finalTier}`);
    
    localStorage.setItem('last_simulation_moda', JSON.stringify({ "Starters": S, "Extenders": E, "Interrupcion": Inter, "Bricks": B }));
}
    function calculateProbabilityTable() {
    // 1. Obtener el valor actual del input (con validación básica)
    const thresholdInput = document.getElementById('prob-threshold').value;
    let umbral = (parseFloat(thresholdInput) || 60) / 100;
    
    // Limitar el umbral entre 1% y 99% para evitar errores matemáticos
    if (umbral > 0.99) umbral = 0.99;
    if (umbral < 0.01) umbral = 0.01;

    const matrix = [];
    const nHand = 5;

    // 2. Obtener la configuración de TIER S
    const tierS = customTierRules.find(r => r.name === "S");
    if (!tierS) return; // Si no hay tier S, no podemos calcular

    const minS_Intervalo = tierS.rules["Starters"][0];
    const minSE_Intervalo = tierS.rules["Motor (S+E)"][0];
    const minInter_Intervalo = tierS.rules["Interrupcion"][0];

    // 3. Generar la matriz para cada tamaño de deck
    for (let N = 40; N <= 60; N++) {
        // Cálculo de Starters
        let startersNecesarios = 0;
        for (let K = 0; K <= N; K++) {
            if (calculateHypergeometricProb(N, K, nHand, minS_Intervalo) >= umbral) {
                startersNecesarios = K;
                break;
            }
        }

        // Cálculo de Extenders (con tu lógica de resta)
        let diffIntervaloSE = Math.max(0, minSE_Intervalo - minS_Intervalo);
        let extendersNecesarios = 0;
        
        if (diffIntervaloSE === 0) {
            for (let K = 0; K <= N; K++) {
                let probExacta0 = combinations(N - K, 5) / combinations(N, 5);
                if (probExacta0 >= umbral) { extendersNecesarios = K; } else { break; }
            }
        } else {
            for (let K = 0; K <= N; K++) {
                if (calculateHypergeometricProb(N, K, nHand, diffIntervaloSE) >= umbral) {
                    extendersNecesarios = K;
                    break;
                }
            }
        }

        // Cálculo de Interrupciones
        let interNecesarias = 0;
        for (let K = 0; K <= N; K++) {
            if (calculateHypergeometricProb(N, K, nHand, minInter_Intervalo) >= umbral) {
                interNecesarias = K;
                break;
            }
        }

        // Cálculo de OTHERS
        let others = N - startersNecesarios - extendersNecesarios - interNecesarias;

        matrix.push({
            totalDeck: N,
            starters: startersNecesarios,
            extenders: extendersNecesarios,
            inter: interNecesarias,
            others: others
        });
    }

    // 4. Guardar y Renderizar
    localStorage.setItem('probability_matrix', JSON.stringify(matrix));
    renderProbabilityTable();
}

// Función auxiliar necesaria para el cálculo de combinaciones (fuera de la principal)
function combinations(n, k) {
    if (k < 0 || k > n) return 0;
    if (k === 0 || k === n) return 1;
    if (k > n / 2) k = n - k;
    let res = 1;
    for (let i = 1; i <= k; i++) res = res * (n - i + 1) / i;
    return res;
}

function renderProbabilityTable() {
    const matrix = JSON.parse(localStorage.getItem('probability_matrix'));
    const tbody = document.getElementById('prob-table-body');
    const tableHead = document.querySelector('#prob-table thead tr');
    if (!matrix || !tbody) return;

    document.getElementById('prob-table-container').style.display = 'block';
    
    // Actualizar encabezados
    tableHead.innerHTML = `
        <th style="padding: 10px; border-radius: 10px 0 0 10px;">DECK</th>
        <th style="padding: 10px;">STARTERS</th>
        <th style="padding: 10px;">EXTENDERS</th>
        <th style="padding: 10px;">INTERRUPCION</th>
        <th style="padding: 10px; border-radius: 0 10px 10px 0;">OTHERS</th>
    `;

    tbody.innerHTML = '';
    matrix.forEach(row => {
        const tr = document.createElement('tr');
        tr.style.borderBottom = "0.5px solid var(--ios-gray)";
        tr.innerHTML = `
            <td style="padding:10px; font-weight:bold;">${row.totalDeck}</td>
            <td>${row.starters}</td>
            <td>${row.extenders}</td>
            <td>${row.inter}</td>
            <td>${row.others}</td>
        `;
        tbody.appendChild(tr);
    });
}
async function executePowerUp() {
    const display = document.getElementById('powerup-results');
    display.style.display = 'block';
    
    const matrix = JSON.parse(localStorage.getItem('probability_matrix'));
    const savedData = JSON.parse(localStorage.getItem('ygo_deck_save'));
    const moda = JSON.parse(localStorage.getItem('last_simulation_moda'));

    if (!matrix || !savedData || !moda) {
        display.innerHTML = "⚠️ Falta información para calcular.";
        return;
    }

    const currentTotal = parseInt(document.getElementById('deck-total').innerText);
    const totalS = savedData.Starters.reduce((a, b) => a + (b.qty || 0), 0);
    const totalE = savedData.Extenders.reduce((a, b) => a + (b.qty || 0), 0);
    const totalInter = savedData.Interrupcion.reduce((a, b) => a + (b.qty || 0), 0);
    const totalB = savedData.Bricks.reduce((a, b) => a + (b.qty || 0), 0);

    let plan = [];
    let nSugerido = currentTotal;

    // 1. Lógica de Dilución por Bricks (Búsqueda de nuevo tamaño)
    // Buscamos un tamaño en la matriz donde 'others' >= totalB
    let foundSize = false;
    for (let n = currentTotal; n <= 60; n++) {
        const row = matrix.find(r => r.totalDeck === n);
        if (row && row.others >= totalB) {
            nSugerido = n;
            foundSize = true;
            break;
        }
    }

    if (foundSize && nSugerido > currentTotal) {
        plan.push(`📈 <b>Diluir Bricks:</b> Aumentar tamaño del deck a <b>${nSugerido}</b> cartas para soportar los ${totalB} Bricks.`);
    } else if (!foundSize) {
        plan.push("⚠️ <b>Atención:</b> No es posible diluir suficientes Bricks hasta 60 cartas. Considera reducir el número de Bricks.");
    }

    // 2. Comparativa de Ratios (basada en el tamaño nSugerido)
    const targetRow = matrix.find(r => r.totalDeck === nSugerido);
    if (!targetRow) {
        display.innerHTML = "⚠️ Mazo fuera de rango para las sugerencias.";
        return;
    }

    const checkDiff = (actual, target, label) => {
        const diff = target - actual;
        if (diff > 0) return `➕ <b>Añadir:</b> ${diff} ${label}.`;
        if (diff < 0) return `➖ <b>Retirar:</b> ${Math.abs(diff)} ${label}.`;
        return null;
    };

    const s = checkDiff(totalS, targetRow.starters, "Starters");
    const e = checkDiff(totalE, targetRow.extenders, "Extenders");
    const i = checkDiff(totalInter, targetRow.inter, "Interrupciones");

    if (s) plan.push(s);
    if (e) plan.push(e);
    if (i) plan.push(i);

    // 3. Mostrar resultado
    display.innerHTML = plan.length > 0 
        ? `<div style="border-left:4px solid var(--ios-blue); padding-left:10px;"><b>Plan de Acción (para ${nSugerido} cartas):</b><br>${plan.join('<br>')}</div>`
        : `<div style="color:var(--ios-green); font-weight:bold; text-align:center;">✅ ¡Deck óptimo!</div>`;
}
    function handleDeleteClick() {
        const btn = document.getElementById('deleteBtn');
        if (!deleteConfirm.active) {
            deleteConfirm.active = true; btn.innerText = "CONFIRMAR CLEAR"; btn.classList.add('confirm-clear');
            deleteConfirm.timeout = setTimeout(() => { deleteConfirm.active = false; btn.innerText = "CLEAR DECK"; btn.classList.remove('confirm-clear'); }, 2500);
        } else {
            clearTimeout(deleteConfirm.timeout); localStorage.removeItem('ygo_deck_save'); location.reload();
        }
    }

function actualizarTodo() {
    // 1. Recalcular la Matriz de Probabilidad primero (basado en el nuevo umbral)
    calculateProbabilityTable();
    
    // 2. Ejecutar el análisis del mazo (Simulación de manos)
    // Asumiendo que tu función principal se llama executeAnalysis()
    // Esta función es la que genera la "moda" y los datos que usa el Plan de Acción
    executeAnalysis(); 
    
    // 3. Ejecutar el Plan de Acción para actualizar el mensaje según los nuevos resultados
    executePowerUp();
}

function runMonteCarloModa(data, handSize, N) {
    const iterations = 10000;
    const frequencies = {};
    
    // 1. Crear el mazo plano
    let flatDeck = [];
    ["Starters", "Extenders", "Interrupcion", "Bricks"].forEach(cat => {
        if (data[cat]) {
            data[cat].forEach(card => {
                for (let i = 0; i < card.qty; i++) {
                    flatDeck.push({ c: cat, n: card.name, h: card.hopt });
                }
            });
        }
    });

    while (flatDeck.length < N) {
        flatDeck.push({ c: "Random", n: "Random", h: false });
    }

    // 2. Simulación
    for (let i = 0; i < iterations; i++) {
        // Shuffle Fisher-Yates
        let deck = [...flatDeck];
        for (let j = deck.length - 1; j > 0; j--) {
            const k = Math.floor(Math.random() * (j + 1));
            [deck[j], deck[k]] = [deck[k], deck[j]];
        }

        // Tomar la mano (5 o 6 cartas)
        let hand = deck.slice(0, handSize);
        let cleanedHandCounts = { "Starters": 0, "Extenders": 0, "Interrupcion": 0, "Bricks": 0, "Random": 0 };
        let usedHOPTNames = new Set();

        // Limpiar la mano de duplicados HOPT antes de contar
        hand.forEach(card => {
            if (card.c === "Random") {
                cleanedHandCounts["Random"]++;
            } else if (card.h) {
                if (!usedHOPTNames.has(card.n)) {
                    cleanedHandCounts[card.c]++;
                    usedHOPTNames.add(card.n);
                } else {
                    // Copia repetida de HOPT se convierte en espacio muerto
                    cleanedHandCounts["Random"]++;
                }
            } else {
                cleanedHandCounts[card.c]++;
            }
        });

        // Guardar esta mano específica en el registro de frecuencias
        const handKey = JSON.stringify(cleanedHandCounts);
        frequencies[handKey] = (frequencies[handKey] || 0) + 1;
    }

    // 3. Obtener la moda (la mano que más se repitió)
    const modaKey = Object.keys(frequencies).reduce((a, b) => frequencies[a] > frequencies[b] ? a : b);
    return JSON.parse(modaKey);
}
